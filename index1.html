<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #e2e8f0; margin: 0; min-height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* СЛОЙ ЭФФЕКТОВ НА ФОНЕ */
        #weather-bg { position: absolute; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; border-radius: 2.5rem; }
        
        /* Дождь */
        .rain-drop { position: absolute; background: rgba(255,255,255,0.2); width: 1px; height: 20px; top: -50px; animation: rain-fall linear infinite; }
        @keyframes rain-fall { to { transform: translateY(650px); } }

        /* Снег */
        .snow-flake { position: absolute; background: white; border-radius: 50%; top: -10px; animation: snow-fall linear infinite; }
        @keyframes snow-fall { 
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(600px) translateX(20px); opacity: 0; } 
        }

        /* Солнце */
        .sun-aura { position: absolute; top: -10%; right: -10%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(255,200,50,0.15) 0%, transparent 70%); animation: sun-pulse 5s ease-in-out infinite; }
        @keyframes sun-pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.3); opacity: 0.7; } }

        /* AQI - ГАРАНТИРОВАННО ЗАКРЫТ */
        #aqi-details { display: grid; grid-template-rows: 0fr; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; overflow: hidden; }
        #aqi-details.open { grid-template-rows: 1fr; opacity: 1; margin-top: 1rem; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 2s infinite linear; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-12">
    <div class="container mx-auto p-4 max-w-6xl">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8 mt-6">
            <h1 class="text-4xl font-black text-white tracking-tighter uppercase italic">
                <span class="text-blue-400">Sky</span>Cast
            </h1>
            <div class="flex flex-col md:flex-row gap-3 w-full md:w-auto">
                <form onsubmit="event.preventDefault(); searchCity();" class="relative flex-grow md:w-64">
                    <input type="text" id="city-input" placeholder="Поиск города..." 
                           class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-3.5 px-5 pr-14 focus:outline-none focus:border-blue-500 text-white placeholder-slate-500">
                    <button type="submit" class="absolute right-2 top-1/2 -translate-y-1/2 bg-blue-600 hover:bg-blue-500 w-10 h-10 rounded-xl flex items-center justify-center text-white transition-all active:scale-90">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </button>
                </form>
                <button onclick="getLocation()" class="bg-slate-800 border border-slate-700 px-5 py-3 rounded-2xl text-sm font-bold text-white hover:bg-slate-700 active:scale-95 transition-all">📍 Мое место</button>
            </div>
        </header>

        <div id="loader" class="space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-8 h-80 skeleton rounded-[2.5rem]"></div>
                <div class="lg:col-span-4 grid grid-cols-2 gap-4">
                    <div class="h-32 skeleton rounded-3xl"></div>
                    <div class="h-32 skeleton rounded-3xl"></div>
                </div>
            </div>
        </div>

        <main id="main-content" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8 text-white">
                
                <div id="main-card" class="lg:col-span-8 glass p-6 sm:p-10 rounded-[2.5rem] relative overflow-hidden shadow-2xl">
                    <div id="weather-bg"></div> <div class="flex flex-col md:flex-row justify-between items-center relative z-10">
                        <div class="text-center md:text-left w-full md:max-w-[60%]">
                            <h2 id="city-name" class="text-5xl sm:text-6xl font-extrabold tracking-tighter mb-2 leading-none">--</h2>
                            <p id="current-desc" class="text-blue-400 text-lg sm:text-2xl font-medium capitalize mb-6"></p>
                            
                            <div class="flex flex-wrap gap-3 justify-center md:justify-start">
                                <button onclick="toggleAQI()" id="aqi-card" class="bg-slate-900/50 px-4 py-3 rounded-2xl border border-white/5 hover:bg-slate-800 transition-all">
                                    <span class="text-slate-500 text-[10px] block uppercase font-black mb-1">Воздух (AQI) ▾</span>
                                    <div class="flex items-center gap-2">
                                        <span id="aqi-val" class="font-bold text-lg">--</span>
                                        <span id="aqi-text" class="text-[10px] font-bold px-2 py-0.5 rounded-md bg-slate-800">--</span>
                                    </div>
                                </button>
                                <div class="bg-slate-900/50 px-4 py-3 rounded-2xl border border-white/5">
                                    <span class="text-slate-500 text-[10px] block uppercase font-black mb-1">Облачность</span>
                                    <span id="clouds" class="font-bold text-lg">--</span><span class="text-xs ml-1 font-bold text-slate-400">%</span>
                                </div>
                            </div>
                            <div id="aqi-details"><div id="aqi-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3 p-5 bg-slate-950/60 rounded-3xl border border-blue-500/10 mt-4 shadow-xl"></div></div>
                        </div>

                        <div class="text-center mt-6 md:mt-0 flex flex-col items-center">
                            <img id="main-icon" src="" class="w-32 h-32 md:w-44 md:h-44 object-contain drop-shadow-2xl">
                            <div id="current-temp" class="text-7xl md:text-9xl font-black leading-none tracking-tighter">--°</div>
                            <p class="text-slate-400 mt-4 text-xs font-bold uppercase tracking-widest italic">☀️ <span id="sunrise">--</span> | 🌙 <span id="sunset">--</span></p>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-4 grid grid-cols-2 gap-4 font-bold">
                    <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center items-center shadow-lg">
                        <span class="text-slate-500 text-[10px] uppercase mb-3 font-black">Ветер</span>
                        <div id="wind-dir" class="text-2xl text-blue-500 transition-all duration-1000">↑</div>
                        <div class="text-xl font-black"><span id="wind">--</span> <span class="text-xs text-slate-500">м/с</span></div>
                    </div>
                    <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center shadow-lg">
                        <span class="text-slate-500 text-[10px] uppercase mb-1">Давление</span>
                        <div id="pressure" class="text-2xl font-black">--</div>
                    </div>
                    <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center shadow-lg">
                        <span class="text-slate-500 text-[10px] uppercase mb-1">Влажность</span>
                        <div id="humidity" class="text-3xl font-black">--</div>
                    </div>
                    <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center shadow-lg">
                        <span class="text-slate-500 text-[10px] uppercase mb-1 leading-none">Ощущается</span>
                        <div id="feels-like" class="text-3xl font-black mt-1">--°</div>
                    </div>
                </div>
            </div>

            <div id="hourly-grid" class="flex gap-4 overflow-x-auto pb-6 mb-8 no-scrollbar scroll-smooth"></div>
            <div class="glass p-8 rounded-[2.5rem] mb-8 shadow-2xl">
                <h3 class="text-lg font-bold mb-6">📊 Температурный тренд</h3>
                <div class="h-[250px] w-full"><canvas id="tempChart"></canvas></div>
            </div>
            <div id="forecast-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4 px-2"></div>
        </main>
    </div>

    <script>
        const API_KEY = "604b73696fe82cfda93d7d8278c9faff";
        let chart;

        const aqiLevels = { 1: { text: "Чисто", color: "text-green-400" }, 2: { text: "Норма", color: "text-yellow-400" }, 3: { text: "Средне", color: "text-orange-400" }, 4: { text: "Плохо", color: "text-red-400" }, 5: { text: "Опасно", color: "text-purple-400" } };
        const pollutantNames = { co: "CO (Угарный газ)", no2: "NO₂ (Диоксид азота)", o3: "O₃ (Озон)", so2: "SO₂ (Диоксид серы)", pm2_5: "PM2.5 (Мелкая пыль)", pm10: "PM10 (Крупная пыль)" };
        
        const getCompColor = (k, v) => {
            const lim = { pm2_5: [10, 25, 50, 75], pm10: [20, 50, 100, 200], no2: [40, 70, 150, 200], o3: [60, 100, 140, 180] };
            if (!lim[k]) return 'text-white';
            if (v <= lim[k][0]) return 'text-green-400';
            if (v <= lim[k][1]) return 'text-yellow-400';
            if (v <= lim[k][2]) return 'text-orange-400';
            return 'text-red-400';
        };

        // ХУДОЖЕСТВЕННЫЙ ФОН
        function setArtBackground(code) {
            const bg = document.getElementById('weather-bg');
            bg.innerHTML = '';
            
            if (code >= 200 && code < 600) { // Дождь
                for(let i=0; i<60; i++) createParticle(bg, 'rain-drop');
            } else if (code >= 600 && code < 700) { // Снег
                for(let i=0; i<40; i++) createParticle(bg, 'snow-flake');
            } else if (code === 800) { // Солнце
                const s = document.createElement('div'); s.className = 'sun-aura'; bg.appendChild(s);
            } else if (code > 800 || (code >= 700 && code < 800)) { // Облака/Туман
                for(let i=0; i<5; i++) {
                    const m = document.createElement('div'); m.className = 'mist-layer';
                    m.style.top = (Math.random()*100)+'%'; m.style.width = (Math.random()*300+200)+'px';
                    m.style.height = m.style.width; m.style.animationDuration = (Math.random()*20+15)+'s';
                    bg.appendChild(m);
                }
            }
        }

        function createParticle(container, className) {
            const p = document.createElement('div');
            p.className = className;
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 2 + 's';
            p.style.animationDuration = (className === 'rain-drop' ? (Math.random()*0.5+0.4) : (Math.random()*4+4)) + 's';
            if (className === 'snow-flake') {
                const s = Math.random() * 6 + 3 + 'px';
                p.style.width = s; p.style.height = s;
            }
            container.appendChild(p);
        }

        async function fetchWeather(query) {
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('main-content').classList.add('hidden');
            try {
                let url = typeof query === 'string' 
                    ? `https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(query)}&appid=${API_KEY}&units=metric&lang=ru`
                    : `https://api.openweathermap.org/data/2.5/forecast?lat=${query.lat}&lon=${query.lon}&appid=${API_KEY}&units=metric&lang=ru`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.cod !== "200") throw new Error(data.message);
                updateUI(data);
                fetchAQI(data.city.coord.lat, data.city.coord.lon);
                setArtBackground(data.list[0].weather[0].id);
            } catch (e) {
                alert("Ошибка сети. Проверьте VPN.");
            } finally {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            }
        }

        async function fetchAQI(lat, lon) {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`);
                const data = await res.json();
                const card = document.getElementById('aqi-card');
                card.classList.remove('hidden');
                const main = data.list[0].main.aqi;
                document.getElementById('aqi-val').innerText = main;
                document.getElementById('aqi-text').innerText = aqiLevels[main].text;
                document.getElementById('aqi-text').className = `text-[10px] font-bold px-2 py-0.5 rounded-md bg-slate-800 ${aqiLevels[main].color}`;
                document.getElementById('aqi-grid').innerHTML = Object.entries(data.list[0].components)
                    .filter(([k]) => pollutantNames[k])
                    .map(([k, v]) => `
                        <div class="flex justify-between items-center bg-white/5 p-3 px-4 rounded-xl shadow-sm border border-white/5">
                            <span class="text-slate-400 text-[10px] font-bold uppercase tracking-wider">${pollutantNames[k]}</span>
                            <span class="font-black ${getCompColor(k, v)}">${Math.round(v)}</span>
                        </div>
                    `).join('');
            } catch(e) { document.getElementById('aqi-card').classList.add('hidden'); }
        }

        function updateUI(data) {
            const cur = data.list[0];
            const city = data.city;
            document.getElementById('city-name').innerText = city.name;
            document.getElementById('current-temp').innerText = `${Math.round(cur.main.temp)}°`;
            document.getElementById('current-desc').innerText = cur.weather[0].description;
            document.getElementById('main-icon').src = `https://openweathermap.org/img/wn/${cur.weather[0].icon}@4x.png`;
            document.getElementById('feels-like').innerText = `${Math.round(cur.main.feels_like)}°`;
            document.getElementById('clouds').innerText = cur.clouds.all;
            document.getElementById('humidity').innerText = cur.main.humidity;
            document.getElementById('pressure').innerText = Math.round(cur.main.pressure * 0.75006);
            document.getElementById('wind').innerText = Math.round(cur.wind.speed);
            
            const formatTime = (ts) => new Date(ts * 1000).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('sunrise').innerText = formatTime(city.sunrise);
            document.getElementById('sunset').innerText = formatTime(city.sunset);

            document.getElementById('hourly-grid').innerHTML = data.list.slice(0, 12).map(h => `
                <div class="glass min-w-[110px] p-4 rounded-3xl text-center border-white/5">
                    <div class="text-slate-500 text-[10px] font-bold uppercase">${h.dt_txt.split(' ')[1].substring(0, 5)}</div>
                    <img src="https://openweathermap.org/img/wn/${h.weather[0].icon}.png" class="mx-auto w-10">
                    <div class="text-lg font-black text-white">${Math.round(h.main.temp)}°</div>
                </div>
            `).join('');

            const dailyData = data.list.filter(item => item.dt_txt.includes("12:00:00"));
            if (chart) chart.destroy();
            chart = new Chart(document.getElementById('tempChart'), {
                type: 'line',
                data: {
                    labels: dailyData.map(d => new Date(d.dt * 1000).toLocaleDateString('ru', {weekday: 'short'})),
                    datasets: [{ data: dailyData.map(d => d.main.temp), borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)', pointRadius: 5, borderWidth: 3 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#ffffff' } }, x: { ticks: { color: '#94a3b8' } } } }
            });

            document.getElementById('forecast-grid').innerHTML = dailyData.map(day => `
                <div class="glass p-5 rounded-3xl text-center">
                    <div class="text-slate-500 text-[10px] font-bold uppercase mb-1 tracking-tighter">${new Date(day.dt * 1000).toLocaleDateString('ru', {day: 'numeric', month: 'short'})}</div>
                    <img src="https://openweathermap.org/img/wn/${day.weather[0].icon}@2x.png" class="mx-auto w-12">
                    <div class="text-xl font-black text-white">${Math.round(day.main.temp)}°</div>
                </div>
            `).join('');
        }

        const toggleAQI = () => document.getElementById('aqi-details').classList.toggle('open');
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    p => fetchWeather({ lat: p.coords.latitude, lon: p.coords.longitude }),
                    () => fetchWeather("Moscow"), { timeout: 5000 }
                );
            } else { fetchWeather("Moscow"); }
        }
        function searchCity() {
            const v = document.getElementById('city-input').value.trim();
            if (v) fetchWeather(v);
        }
        window.onload = getLocation;
    </script>
</body>
</html>
