name: Deploy Weather Pro

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # ЭТИ ТРИ СТРОЧКИ ОБЯЗАТЕЛЬНЫ:
    permissions:
      contents: write
    
    steps:
      - name: Checkout 
        uses: actions/checkout@v3

      - name: Inject API Key
        run: |
          # Заменяем метку на ключ из секретов
          sed -i 's/REPLACE_WITH_API_KEY/${{ secrets.WEATHER_API_KEY }}/g' index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          
