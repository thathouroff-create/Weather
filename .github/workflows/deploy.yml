name: Deploy Weather Pro

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Inject API Key
        run: |
          # Заменяем заглушку в коде на реальный секрет
          sed -i "const API_KEY = \"604b73696fe82cfda93d7d8278c9faff\";" index.html
          # (Здесь мы можем использовать sed, чтобы заменить ключ на секрет)
          # Для простоты обучения сейчас ключ вбит в html, но секрет — это правильный путь.
      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./

