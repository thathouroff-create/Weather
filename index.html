<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast Pro Max</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .map-tiles { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-weather { animation: float 4s ease-in-out infinite; }
        .wind-arrow { transition: transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-12">
    <div class="container mx-auto p-4 max-w-6xl">
        
        <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8 mt-6">
            <h1 class="text-3xl font-black text-white tracking-tighter uppercase italic">SkyCast <span class="text-blue-500">Pro Max</span></h1>
            <div class="flex flex-col md:flex-row gap-3 w-full md:w-auto">
                <div class="relative flex-grow md:w-64">
                    <input type="text" id="city-input" placeholder="Поиск города..." class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-3 px-5 focus:outline-none focus:border-blue-500 text-white">
                    <button onclick="searchCity()" class="absolute right-2 top-2 bg-blue-600 p-2 rounded-xl text-white">🔍</button>
                </div>
                <button onclick="getLocation()" class="bg-slate-800 border border-slate-700 px-5 py-3 rounded-2xl text-sm font-bold hover:bg-slate-700 transition-all active:scale-95">📍 Мое место</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
            <div class="lg:col-span-8 glass p-8 rounded-[2.5rem] flex flex-col md:flex-row justify-between items-center relative overflow-hidden shadow-2xl">
                <div class="z-10 text-center md:text-left w-full md:max-w-[60%]">
                    <h2 id="city-name" class="text-4xl sm:text-5xl lg:text-6xl font-extrabold tracking-tighter text-white mb-2 break-words leading-tight">Загрузка...</h2>
                    <p id="current-desc" class="text-blue-400 text-xl md:text-2xl font-medium capitalize mb-6"></p>
                    
                    <div class="flex flex-wrap gap-3 justify-center md:justify-start">
                        <div class="bg-slate-900/50 px-4 py-3 rounded-2xl border border-white/5">
                            <span class="text-slate-500 text-[10px] block uppercase font-black mb-1">Воздух (AQI)</span>
                            <div class="flex items-center gap-2">
                                <span id="aqi-val" class="font-bold text-lg">--</span>
                                <span id="aqi-text" class="text-xs font-bold px-2 py-0.5 rounded-md bg-slate-800">--</span>
                            </div>
                        </div>
                        <div class="bg-slate-900/50 px-4 py-3 rounded-2xl border border-white/5">
                            <span class="text-slate-500 text-[10px] block uppercase font-black mb-1">Облачность</span>
                            <span id="clouds" class="font-bold text-lg text-white">--</span><span class="text-xs ml-1">%</span>
                        </div>
                    </div>
                </div>

                <div class="z-10 text-center mt-8 md:mt-0 relative">
                    <div id="weather-icon-box" class="animate-weather hidden">
                        <img id="main-icon" src="" class="w-32 h-32 md:w-44 md:h-44 object-contain mx-auto drop-shadow-[0_10px_40px_rgba(59,130,246,0.4)]">
                    </div>
                    <div id="current-temp" class="text-8xl md:text-9xl font-black text-white leading-none tracking-tighter">--°</div>
                    <p class="text-slate-500 mt-4 text-xs font-bold uppercase tracking-widest">
                        ☀️ <span id="sunrise" class="text-white">--:--</span> | 🌙 <span id="sunset" class="text-white">--:--</span>
                    </p>
                </div>
                <div class="absolute -left-20 -bottom-20 w-64 h-64 bg-blue-600/10 rounded-full blur-[100px]"></div>
            </div>

            <div class="lg:col-span-4 grid grid-cols-2 gap-4">
                <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center items-center">
                    <span class="text-slate-500 text-[10px] font-black uppercase mb-3 leading-none">Направление ветра</span>
                    <div class="flex items-center justify-center gap-3">
                        <div id="wind-dir" class="wind-arrow text-3xl text-blue-500 drop-shadow-lg">↑</div>
                        <span id="wind-dir-text" class="text-lg font-black text-white">--</span>
                    </div>
                    <div class="text-xl font-bold mt-2"><span id="wind">--</span> <span class="text-xs text-slate-500">м/с</span></div>
                </div>
                <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center">
                    <span class="text-slate-500 text-[10px] font-black uppercase mb-1 leading-none">Давление</span>
                    <div id="pressure" class="text-2xl font-black text-white">--</div>
                    <span class="text-[10px] text-slate-500 mt-1">мм рт.ст.</span>
                </div>
                <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center">
                    <span class="text-slate-500 text-[10px] font-black uppercase mb-1">Влажность</span>
                    <div id="humidity" class="text-3xl font-black text-white">--</div>
                    <span class="text-[10px] text-slate-500 mt-1">%</span>
                </div>
                <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center">
                    <span class="text-slate-500 text-[10px] font-black uppercase mb-1">Ощущается</span>
                    <div id="feels-like" class="text-3xl font-black text-white">--°</div>
                </div>
            </div>
        </div>

        <div id="hourly-grid" class="flex gap-4 overflow-x-auto pb-6 mb-8 no-scrollbar scroll-smooth"></div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="glass p-8 rounded-[2.5rem]">
                <h3 class="text-lg font-bold mb-6 flex items-center gap-2">📊 Тренд температуры</h3>
                <div class="h-[250px] w-full"><canvas id="tempChart"></canvas></div>
            </div>
            <div id="map" class="h-[350px] lg:h-auto rounded-[2.5rem] border border-white/5 z-0 shadow-2xl"></div>
        </div>

        <div id="forecast-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
    </div>

    <script>
        const API_KEY = "604b73696fe82cfda93d7d8278c9faff"; 
        let map, chart;

        const aqiLevels = {
            1: { text: "Чисто", color: "text-green-400" },
            2: { text: "Норма", color: "text-yellow-400" },
            3: { text: "Средне", color: "text-orange-400" },
            4: { text: "Плохо", color: "text-red-400" },
            5: { text: "Опасно", color: "text-purple-400" }
        };

        // Функция перевода градусов в буквы
        const getWindDirName = (deg) => {
            const directions = ['С', 'СВ', 'В', 'ЮВ', 'Ю', 'ЮЗ', 'З', 'СЗ'];
            return directions[Math.round(deg / 45) % 8];
        };

        const formatTime = (ts) => new Date(ts * 1000).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });

        async function fetchWeather(query) {
            try {
                let coords;
                if (typeof query === 'string') {
                    const geoRes = await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${query}&limit=1&appid=${API_KEY}`);
                    const geoData = await geoRes.json();
                    if (!geoData || geoData.length === 0) throw new Error("Город не найден");
                    coords = { lat: geoData[0].lat, lon: geoData[0].lon };
                } else {
                    coords = query;
                }

                const [weatherRes, aqiRes] = await Promise.all([
                    fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${coords.lat}&lon=${coords.lon}&appid=${API_KEY}&units=metric&lang=ru`),
                    fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${coords.lat}&lon=${coords.lon}&appid=${API_KEY}`)
                ]);

                const weatherData = await weatherRes.json();
                const aqiData = await aqiRes.json();

                updateUI(weatherData, aqiData);
            } catch (e) {
                document.getElementById('city-name').innerText = "Ошибка";
            }
        }

        function updateUI(data, aqiData) {
            const current = data.list[0];
            const city = data.city;
            const aqi = aqiData.list[0].main.aqi;

            const mainIcon = document.getElementById('main-icon');
            mainIcon.src = `https://openweathermap.org/img/wn/${current.weather[0].icon}@4x.png`;
            mainIcon.onload = () => document.getElementById('weather-icon-box').classList.remove('hidden');

            document.getElementById('city-name').innerText = city.name;
            document.getElementById('current-temp').innerText = `${Math.round(current.main.temp)}°`;
            document.getElementById('current-desc').innerText = current.weather[0].description;
            document.getElementById('feels-like').innerText = `${Math.round(current.main.feels_like)}°`;
            document.getElementById('sunrise').innerText = formatTime(city.sunrise);
            document.getElementById('sunset').innerText = formatTime(city.sunset);
            
            document.getElementById('aqi-val').innerText = aqi;
            document.getElementById('aqi-text').innerText = aqiLevels[aqi].text;
            document.getElementById('aqi-text').className = `text-xs font-bold px-2 py-0.5 rounded-md bg-slate-800 ${aqiLevels[aqi].color}`;

            document.getElementById('wind').innerText = Math.round(current.wind.speed);
            document.getElementById('wind-dir').style.transform = `rotate(${current.wind.deg}deg)`;
            document.getElementById('wind-dir-text').innerText = getWindDirName(current.wind.deg);
            document.getElementById('humidity').innerText = current.main.humidity;
            document.getElementById('clouds').innerText = current.clouds.all;
            document.getElementById('pressure').innerText = Math.round(current.main.pressure * 0.75006);

            document.getElementById('hourly-grid').innerHTML = data.list.slice(0, 10).map(h => `
                <div class="glass min-w-[110px] p-4 rounded-3xl text-center border-white/5 hover:border-blue-500/30 transition-all">
                    <div class="text-slate-500 text-[10px] font
