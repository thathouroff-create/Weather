<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #e2e8f0; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        /* Улучшенный Glassmorphism */
        .glass { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
        }

        /* КОНТЕЙНЕР ЭФФЕКТОВ */
        #weather-bg { position: absolute; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; border-radius: 2.5rem; }
        
        /* ДОЖДЬ 2.0 (Кинематографичный с наклоном) */
        .rain-drop {
            position: absolute;
            background: linear-gradient(to bottom, transparent, rgba(186, 230, 253, 0.4));
            width: 1px;
            transform: rotate(15deg);
            animation: fall-rain linear infinite;
        }
        @keyframes fall-rain { to { transform: translateY(650px) rotate(15deg); } }

        /* СНЕГ 2.0 (Объемный) */
        .snow-flake {
            position: absolute;
            background: white;
            border-radius: 50%;
            filter: blur(0.5px);
            animation: snow-fall linear infinite, snow-drift ease-in-out infinite;
        }
        @keyframes snow-fall { to { transform: translateY(650px); } }
        @keyframes snow-drift { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(30px); } }

        /* СОЛНЦЕ (Линзовые блики) */
        .lens-flare {
            position: absolute;
            background: radial-gradient(circle, rgba(255,180,50,0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: flare-move 10s infinite alternate ease-in-out;
        }
        @keyframes flare-move { from { transform: translate(-10%, -10%); } to { transform: translate(20%, 20%); } }

        /* ТУМАН (Слоистый) */
        .mist-cloud {
            position: absolute;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 80%);
            filter: blur(60px);
            border-radius: 50%;
            animation: mist-drift 40s linear infinite;
        }
        @keyframes mist-drift { from { left: -50%; } to { left: 150%; } }

        /* МОЛНИЯ */
        .lightning-bolt {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            z-index: 2;
        }
        .flash-anim { animation: lightning-strike 5s infinite; }
        @keyframes lightning-strike {
            0%, 92%, 94%, 98%, 100% { opacity: 0; }
            93%, 95% { opacity: 0.25; }
        }

        /* AQI - ИСПРАВЛЕННЫЙ СКРЫТЫЙ ВИД */
        #aqi-details { 
            display: grid; 
            grid-template-rows: 0fr; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            opacity: 0; 
            overflow: hidden;
        }
        #aqi-details.open { grid-template-rows: 1fr; opacity: 1; margin-top: 1.5rem; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .skeleton { background: linear-gradient(90deg, #1e293b 25%, #2d3e5a 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 2s infinite linear; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-12">
    <div class="container mx-auto p-4 max-w-6xl">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-6 mb-12 mt-6">
            <h1 class="text-4xl font-black text-white tracking-tighter uppercase italic">
                <span class="text-blue-500">Sky</span>Cast<span class="text-[10px] ml-1 bg-blue-600 px-2 py-0.5 rounded-full not-italic tracking-normal">ULTRA</span>
            </h1>
            <div class="flex flex-col md:flex-row gap-3 w-full md:w-auto">
                <form onsubmit="event.preventDefault(); searchCity();" class="relative flex-grow md:w-80">
                    <input type="text" id="city-input" placeholder="Найти город..." 
                           class="w-full bg-slate-800/40 border border-slate-700/50 rounded-[1.25rem] py-4 px-6 pr-16 focus:outline-none focus:border-blue-500 text-white placeholder-slate-500 transition-all">
                    <button type="submit" class="absolute right-2 top-1/2 -translate-y-1/2 bg-blue-600 hover:bg-blue-500 w-11 h-11 rounded-xl flex items-center justify-center text-white shadow-lg active:scale-90 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </button>
                </form>
                <button onclick="getLocation()" class="bg-slate-800/60 border border-slate-700 px-6 py-4 rounded-[1.25rem] text-sm font-bold text-white hover:bg-slate-700 active:scale-95 transition-all">📍 Местоположение</button>
            </div>
        </header>

        <div id="loader" class="space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-8 h-[450px] skeleton rounded-[3rem]"></div>
                <div class="lg:col-span-4 grid grid-cols-2 gap-4">
                    <div class="h-44 skeleton rounded-[2rem]"></div>
                    <div class="h-44 skeleton rounded-[2rem]"></div>
                    <div class="h-44 skeleton rounded-[2rem]"></div>
                    <div class="h-44 skeleton rounded-[2rem]"></div>
                </div>
            </div>
        </div>

        <main id="main-content" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
                
                <div id="main-card" class="lg:col-span-8 glass p-8 sm:p-14 rounded-[3rem] relative overflow-hidden shadow-2xl transition-all duration-1000 flex flex-col justify-center">
                    <div id="weather-bg"></div>
                    <div id="lightning-layer" class="lightning-bolt pointer-events-none"></div>
                    
                    <div class="flex flex-col md:flex-row justify-between items-center relative z-10 text-white">
                        <div class="text-center md:text-left w-full md:max-w-[55%]">
                            <h2 id="city-name" class="text-5xl sm:text-7xl font-extrabold tracking-tighter mb-3 leading-none">--</h2>
                            <p id="current-desc" class="text-blue-400 text-xl sm:text-3xl font-medium capitalize mb-10 tracking-tight"></p>
                            
                            <div class="flex flex-wrap gap-4 justify-center md:justify-start">
                                <button onclick="toggleAQI()" id="aqi-card" class="bg-white/5 border border-white/10 px-6 py-4 rounded-[1.5rem] hover:bg-white/10 transition-all">
                                    <span class="text-slate-400 text-[10px] block uppercase font-black mb-1">Воздух (AQI) ▾</span>
                                    <div class="flex items-center gap-2">
                                        <span id="aqi-val" class="font-bold text-3xl">--</span>
                                        <span id="aqi-text" class="text-[10px] font-bold px-2.5 py-1 rounded-lg bg-slate-900">--</span>
                                    </div>
                                </button>
                                <div class="bg-white/5 border border-white/10 px-6 py-4 rounded-[1.5rem]">
                                    <span class="text-slate-400 text-[10px] block uppercase font-black mb-1">Облачность</span>
                                    <span id="clouds" class="font-bold text-3xl">--</span><span class="text-lg ml-1 text-slate-400 font-bold">%</span>
                                </div>
                            </div>
                            <div id="aqi-details"><div id="aqi-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3 p-6 bg-black/40 rounded-[2rem] border border-white/5 shadow-2xl"></div></div>
                        </div>

                        <div class="text-center mt-12 md:mt-0 flex flex-col items-center">
                            <div class="relative">
                                <div class="absolute inset-0 bg-blue-500/20 blur-[60px] rounded-full"></div>
                                <img id="main-icon" src="" class="w-48 h-48 md:w-64 md:h-64 object-contain relative z-10 drop-shadow-[0_20px_50px_rgba(0,0,0,0.4)]">
                            </div>
                            <div id="current-temp" class="text-[9rem] sm:text-[11rem] font-black leading-none tracking-tighter mt-[-1rem]">--°</div>
                            <div class="flex gap-6 justify-center text-slate-400 text-xs font-bold uppercase tracking-[0.2em] mt-2">
                                <span>☀️ <span id="sunrise" class="text-white">--</span></span>
                                <span>🌙 <span id="sunset" class="text-white">--</span></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-4 grid grid-cols-2 gap-4 text-white">
                    <div class="glass p-8 rounded-[2.5rem] text-center flex flex-col justify-center items-center group hover:bg-white/5 transition-all">
                        <span class="text-slate-500 text-[10px] font-black uppercase mb-4 tracking-widest">Ветер</span>
                        <div id="wind-dir" class="text-4xl text-blue-500 mb-3 transition-all duration-1000">↑</div>
                        <div class="text-3xl font-black"><span id="wind">--</span><span class="text-sm ml-1 text-slate-500 font-bold">м/с</span></div>
                    </div>
                    <div class="glass p-8 rounded-[2.5rem] text-center flex flex-col justify-center group hover:bg-white/5 transition-all">
                        <span class="text-slate-500 text-[10px] font-black uppercase mb-3 tracking-widest">Давление</span>
                        <div id="pressure" class="text-3xl font-black">--</div>
                        <span class="text-[10px] text-slate-500 mt-2 font-bold uppercase">мм рт.ст.</span>
                    </div>
                    <div class="glass p-8 rounded-[2.5rem] text-center flex flex-col justify-center group hover:bg-white/5 transition-all">
                        <span class="text-slate-500 text-[10px] font-black uppercase mb-3 tracking-widest">Влажность</span>
                        <div id="humidity" class="text-4xl font-black">--<span class="text-lg ml-1 text-slate-500">%</span></div>
                    </div>
                    <div class="glass p-8 rounded-[2.5rem] text-center flex flex-col justify-center group hover:bg-white/5 transition-all">
                        <span class="text-slate-500 text-[10px] font-black uppercase mb-3 tracking-widest">Ощущается</span>
                        <div id="feels-like" class="text-4xl font-black mt-1">--°</div>
                    </div>
                </div>
            </div>

            <div id="hourly-grid" class="flex gap-4 overflow-x-auto pb-8 mb-10 no-scrollbar scroll-smooth"></div>
            
            <div class="glass p-10 rounded-[3rem] mb-10 text-white shadow-2xl">
                <h3 class="text-xl font-bold mb-10 flex items-center gap-3">
                    <span class="w-3 h-3 bg-blue-500 rounded-full shadow-[0_0_15px_rgba(59,130,246,0.5)]"></span> 
                    Температурный тренд
                </h3>
                <div class="h-[300px] w-full"><canvas id="tempChart"></canvas></div>
            </div>

            <div id="forecast-grid" class="grid grid-cols-2 md:grid-cols-5 gap-5"></div>
        </main>
    </div>

    <script>
        const API_KEY = "604b73696fe82cfda93d7d8278c9faff";
        let chart;

        const aqiLevels = { 
            1: { text: "Чисто", color: "text-green-400", bg: "bg-green-400/20" }, 
            2: { text: "Норма", color: "text-yellow-400", bg: "bg-yellow-400/20" }, 
            3: { text: "Средне", color: "text-orange-400", bg: "bg-orange-400/20" }, 
            4: { text: "Плохо", color: "text-red-400", bg: "bg-red-400/20" }, 
            5: { text: "Опасно", color: "text-purple-400", bg: "bg-purple-400/20" } 
        };

        const pollutantNames = { co: "CO", no2: "NO₂", o3: "O₃", so2: "SO₂", pm2_5: "PM2.5", pm10: "PM10" };

        const getCompColor = (k, v) => {
            const lim = { pm2_5: [10, 25, 50, 75], pm10: [20, 50, 100, 200], no2: [40, 70, 150, 200], o3: [60, 100, 140, 180] };
            if (!lim[k]) return 'text-white';
            if (v <= lim[k][0]) return 'text-green-400';
            if (v <= lim[k][1]) return 'text-yellow-400';
            if (v <= lim[k][2]) return 'text-orange-400';
            return 'text-red-400';
        };

        function setWeatherEffect(code) {
            const bg = document.getElementById('weather-bg');
            const card = document.getElementById('main-card');
            const bolt = document.getElementById('lightning-layer');
            bg.innerHTML = '';
            bolt.classList.remove('flash-anim');

            // Цветовая атмосфера карточки
            if (code >= 200 && code < 300) card.style.background = "linear-gradient(135deg, #1e1b4b 0%, #020617 100%)";
            else if (code >= 300 && code < 600) card.style.background = "linear-gradient(135deg, #0f172a 0%, #020617 100%)";
            else if (code >= 600 && code < 700) card.style.background = "linear-gradient(135deg, #1e293b 0%, #0f172a 100%)";
            else if (code === 800) card.style.background = "linear-gradient(135deg, #1e3a8a 0%, #020617 100%)";
            else card.style.background = "rgba(15, 23, 42, 0.6)";

            // Элементы погоды
            if (code >= 200 && code < 300) { // Гроза
                bolt.classList.add('flash-anim');
                createParticles(bg, 'rain-drop', 40);
            } else if (code >= 300 && code < 600) { // Дождь
                createParticles(bg, 'rain-drop', 100);
            } else if (code >= 600 && code < 700) { // Снег
                createParticles(bg, 'snow-flake', 60);
            } else if (code >= 700 && code < 800 || code > 800) { // Облака/Туман
                for(let i=0; i<6; i++) {
                    const m = document.createElement('div');
                    m.className = 'mist-cloud';
                    m.style.width = Math.random() * 400 + 200 + 'px';
                    m.style.height = m.style.width;
                    m.style.top = Math.random() * 100 + '%';
                    m.style.animationDelay = (i * 4) + 's';
                    bg.appendChild(m);
                }
            } else if (code === 800) { // Ясно
                for(let i=0; i<3; i++) {
                    const f = document.createElement('div');
                    f.className = 'lens-flare';
                    f.style.width = (200 + i * 150) + 'px';
                    f.style.height = f.style.width;
                    f.style.top = '-10%'; f.style.right = '-10%';
                    f.style.animationDelay = (i * 2) + 's';
                    bg.appendChild(f);
                }
            }
        }

        function createParticles(container, className, count) {
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = className;
                p.style.left = Math.random() * 100 + '%';
                if (className === 'rain-drop') {
                    p.style.height = Math.random() * 30 + 10 + 'px';
                    p.style.animationDuration = Math.random() * 0.4 + 0.3 + 's';
                    p.style.animationDelay = Math.random() * 2 + 's';
                } else if (className === 'snow-flake') {
                    const s = Math.random() * 5 + 2;
                    p.style.width = s + 'px'; p.style.height = s + 'px';
                    p.style.animationDuration = Math.random() * 3 + 4 + 's, ' + (Math.random() * 3 + 2) + 's';
                    p.style.animationDelay = Math.random() * 5 + 's';
                }
                container.appendChild(p);
            }
        }

        const toggleAQI = () => document.getElementById('aqi-details').classList.toggle('open');

        async function fetchWeather(query) {
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('main-content').classList.add('hidden');
            try {
                let url = typeof query === 'string' 
                    ? `https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(query)}&appid=${API_KEY}&units=metric&lang=ru`
                    : `https://api.openweathermap.org/data/2.5/forecast?lat=${query.lat}&lon=${query.lon}&appid=${API_KEY}&units=metric&lang=ru`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.cod !== "200") throw new Error(data.message);
                updateUI(data);
                fetchAQI(data.city.coord.lat, data.city.coord.lon);
                setWeatherEffect(data.list[0].weather[0].id);
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            } catch (e) {
                alert("Ошибка соединения. Включите VPN.");
            }
        }

        async function fetchAQI(lat, lon) {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`);
                const data = await res.json();
                const main = data.list[0].main.aqi;
                document.getElementById('aqi-card').classList.remove('hidden');
                document.getElementById('aqi-val').innerText = main;
                document.getElementById('aqi-text').innerText = aqiLevels[main].text;
                document.getElementById('aqi-text').className = `text-[10px] font-bold px-2.5 py-1 rounded-lg ${aqiLevels[main].bg} ${aqiLevels[main].color}`;
                document.getElementById('aqi-grid').innerHTML = Object.entries(data.list[0].components)
                    .filter(([k]) => pollutantNames[k])
                    .map(([k, v]) => `<div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5"><span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${pollutantNames[k]}</span><span class="text-xl font-black ${getCompColor(k, v)}">${Math.round(v)}</span></div>`).join('');
            } catch(e) { document.getElementById('aqi-card').classList.add('hidden'); }
        }

        function updateUI(data) {
            const cur = data.list[0];
            const city = data.city;
            document.getElementById('city-name').innerText = city.name;
            document.getElementById('current-temp').innerText = `${Math.round(cur.main.temp)}°`;
            document.getElementById('current-desc').innerText = cur.weather[0].description;
            document.getElementById('main-icon').src = `https://openweathermap.org/img/wn/${cur.weather[0].icon}@4x.png`;
            document.getElementById('feels-like').innerText = `${Math.round(cur.main.feels_like)}°`;
            document.getElementById('clouds').innerText = cur.clouds.all;
