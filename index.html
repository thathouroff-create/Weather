<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast Pro 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .map-tiles { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
    </style>
</head>
<body class="pb-12">
    <div class="container mx-auto p-4 max-w-6xl">
        
        <div class="flex flex-col md:flex-row gap-4 mb-8 mt-6">
            <div class="relative flex-grow">
                <input type="text" id="city-input" placeholder="Введите город..." class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-4 px-6 focus:outline-none focus:border-blue-500 transition-all">
                <button onclick="searchCity()" class="absolute right-3 top-3 bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-xl font-bold transition-all">Поиск</button>
            </div>
            <button onclick="getLocation()" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 px-6 py-4 rounded-2xl flex items-center justify-center gap-2 transition-all">
                📍 Мое местоположение
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
            <div class="lg:col-span-8 glass p-8 rounded-[2.5rem] flex flex-col md:flex-row justify-between items-center relative overflow-hidden">
                <div class="z-10 text-center md:text-left">
                    <h1 id="city-name" class="text-6xl font-extrabold tracking-tighter text-white mb-2">Определение...</h1>
                    <p id="current-desc" class="text-blue-400 text-2xl font-medium capitalize"></p>
                </div>
                <div class="z-10 text-center mt-8 md:mt-0">
                    <div id="current-temp" class="text-9xl font-black text-white leading-none">--°</div>
                    <p class="text-slate-400 mt-2 text-lg">Ощущается как <span id="feels-like">--</span>°</p>
                </div>
                <div class="absolute -left-20 -bottom-20 w-64 h-64 bg-blue-600/20 rounded-full blur-[100px]"></div>
            </div>

            <div class="lg:col-span-4 grid grid-cols-2 gap-4">
                <div class="glass p-6 rounded-3xl flex flex-col justify-center items-center text-center">
                    <span class="text-slate-500 text-xs font-bold uppercase mb-2">Ветер</span>
                    <span id="wind" class="text-2xl font-bold">--</span>
                    <span class="text-slate-500 text-xs">м/с</span>
                </div>
                <div class="glass p-6 rounded-3xl flex flex-col justify-center items-center text-center">
                    <span class="text-slate-500 text-xs font-bold uppercase mb-2">Влажность</span>
                    <span id="humidity" class="text-2xl font-bold">--</span>
                    <span class="text-slate-500 text-xs">%</span>
                </div>
                <div class="glass p-6 rounded-3xl flex flex-col justify-center items-center text-center">
                    <span class="text-slate-500 text-xs font-bold uppercase mb-2">Давление</span>
                    <span id="pressure" class="text-xl font-bold">--</span>
                    <span class="text-slate-500 text-xs">мм рт.ст.</span>
                </div>
                <div class="glass p-6 rounded-3xl flex flex-col justify-center items-center text-center">
                    <span class="text-slate-500 text-xs font-bold uppercase mb-2">Облачность</span>
                    <span id="clouds" class="text-xl font-bold">--</span>
                    <span class="text-slate-500 text-xs">%</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="glass p-8 rounded-[2.5rem]">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full"></span> Прогноз температуры
                </h2>
                <canvas id="tempChart" height="200"></canvas>
            </div>
            <div id="map" class="h-full min-h-[350px] rounded-[2.5rem] border border-white/5 z-0"></div>
        </div>

        <div id="forecast-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
    </div>

    <script>
        // ВНИМАНИЕ: Сюда мы будем подставлять ключ через GitHub Actions
        const API_KEY = "604b73696fe82cfda93d7d8278c9faff"; 
        let map, chart;

        async function fetchWeather(query) {
            try {
                let url;
                if (typeof query === 'string') {
                    url = `https://api.openweathermap.org/data/2.5/forecast?q=${query}&appid=${API_KEY}&units=metric&lang=ru`;
                } else {
                    url = `https://api.openweathermap.org/data/2.5/forecast?lat=${query.lat}&lon=${query.lon}&appid=${API_KEY}&units=metric&lang=ru`;
                }

                const res = await fetch(url);
                const data = await res.json();
                if (data.cod !== "200") throw new Error(data.message);
                updateUI(data);
            } catch (e) {
                alert("Ошибка: " + e.message);
            }
        }

        function updateUI(data) {
            const current = data.list[0];
            const daily = data.list.filter((_, i) => i % 8 === 0);

            document.getElementById('city-name').innerText = data.city.name;
            document.getElementById('current-temp').innerText = `${Math.round(current.main.temp)}°`;
            document.getElementById('current-desc').innerText = current.weather[0].description;
            document.getElementById('feels-like').innerText = Math.round(current.main.feels_like);
            document.getElementById('wind').innerText = current.wind.speed;
            document.getElementById('humidity').innerText = current.main.humidity;
            document.getElementById('pressure').innerText = Math.round(current.main.pressure * 0.75006);
            document.getElementById('clouds').innerText = current.clouds.all;

            // Обновление графика
            if (chart) chart.destroy();
            const ctx = document.getElementById('tempChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: daily.map(d => new Date(d.dt * 1000).toLocaleDateString('ru', {weekday: 'short'})),
                    datasets: [{
                        data: daily.map(d => d.main.temp),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true, tension: 0.4, borderWidth: 4, pointRadius: 5
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#64748b' } }, x: { ticks: { color: '#64748b' } } } }
            });

            // Обновление карточек
            const grid = document.getElementById('forecast-grid');
            grid.innerHTML = daily.map(day => `
                <div class="glass p-6 rounded-3xl text-center">
                    <div class="text-slate-500 text-xs font-bold uppercase mb-2">
                        ${new Date(day.dt * 1000).toLocaleDateString('ru', {weekday: 'short', day: 'numeric'})}
                    </div>
                    <img src="https://openweathermap.org/img/wn/${day.weather[0].icon}@2x.png" class="mx-auto w-12">
                    <div class="text-2xl font-black">${Math.round(day.main.temp)}°</div>
                </div>
            `).join('');

            // Обновление карты
            const coords = [data.city.coord.lat, data.city.coord.lon];
            if (!map) {
                map = L.map('map', { zoomControl: false }).setView(coords, 11);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { className: 'map-tiles' }).addTo(map);
            } else {
                map.setView(coords, 11);
            }
            L.circle(coords, { color: '#3b82f6', radius: 2000 }).addTo(map);
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    p => fetchWeather({ lat: p.coords.latitude, lon: p.coords.longitude }),
                    () => fetchWeather("Moscow")
                );
            }
        }

        function searchCity() {
            const val = document.getElementById('city-input').value;
            if (val) fetchWeather(val);
        }

        // Поиск по Enter
        document.getElementById('city-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') searchCity();
        });

        getLocation();
    </script>
</body>
</html>
