<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .map-tiles { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .animate-weather { animation: float 4s ease-in-out infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #aqi-details { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.5s ease-out, opacity 0.3s ease; opacity: 0; }
        #aqi-details.open { grid-template-rows: 1fr; opacity: 1; margin-top: 1rem; }
    </style>
</head>
<body class="pb-12">
    <div class="container mx-auto p-4 max-w-6xl">
        
        <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8 mt-6">
            <h1 class="text-4xl font-black text-white tracking-tighter uppercase italic">
                <span class="text-blue-400">Sky</span>Cast
            </h1>
            <div class="flex flex-col md:flex-row gap-3 w-full md:w-auto">
                <div class="relative flex-grow md:w-64">
                    <input type="text" id="city-input" placeholder="Город..." class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-3 px-5 focus:outline-none focus:border-blue-500 text-white">
                    <button onclick="searchCity()" class="absolute right-2 top-2 bg-blue-600 p-2 rounded-xl text-white">🔍</button>
                </div>
                <button onclick="getLocation()" class="bg-slate-800 border border-slate-700 px-5 py-3 rounded-2xl text-sm font-bold hover:bg-slate-700 transition-all active:scale-95">📍 Мое место</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
            <div class="lg:col-span-8 glass p-8 rounded-[2.5rem] relative overflow-hidden shadow-2xl">
                <div class="flex flex-col md:flex-row justify-between items-center relative z-10">
                    <div class="text-center md:text-left w-full md:max-w-[60%]">
                        <h2 id="city-name" class="text-4xl sm:text-6xl font-extrabold tracking-tighter text-white mb-2 break-words leading-tight">Загрузка...</h2>
                        <p id="current-desc" class="text-blue-400 text-xl md:text-2xl font-medium capitalize mb-6"></p>
                        
                        <div class="flex flex-col gap-3">
                            <div class="flex flex-wrap gap-3 justify-center md:justify-start">
                                <div onclick="toggleAQI()" id="aqi-card" class="bg-slate-900/50 px-4 py-3 rounded-2xl border border-white/5 cursor-pointer hover:bg-slate-800 transition-all active:scale-95 hidden">
                                    <span class="text-slate-500 text-[10px] block uppercase font-black mb-1">Воздух (AQI) ▾</span>
                                    <div class="flex items-center gap-2">
                                        <span id="aqi-val" class="font-bold text-lg text-white">--</span>
                                        <span id="aqi-text" class="text-[10px] font-bold px-2 py-0.5 rounded-md bg-slate-800">--</span>
                                    </div>
                                </div>
                                <div class="bg-slate-900/50 px-4 py-3 rounded-2xl border border-white/5">
                                    <span class="text-slate-500 text-[10px] block uppercase font-black mb-1">Облачность</span>
                                    <span id="clouds" class="font-bold text-lg text-white">--</span><span class="text-xs ml-1 font-bold text-slate-400">%</span>
                                </div>
                            </div>
                            <div id="aqi-details"><div class="overflow-hidden"><div id="aqi-components-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-2 p-4 bg-slate-900/80 rounded-2xl border border-blue-500/20"></div></div></div>
                        </div>
                    </div>

                    <div class="text-center mt-8 md:mt-0">
                        <div id="weather-icon-box" class="animate-weather">
                            <img id="main-icon" src="" class="w-32 h-32 md:w-40 md:h-40 object-contain mx-auto">
                        </div>
                        <div id="current-temp" class="text-8xl md:text-9xl font-black text-white leading-none tracking-tighter">--°</div>
                        <p class="text-slate-500 mt-4 text-xs font-bold uppercase tracking-widest">
                            ☀️ <span id="sunrise" class="text-white">--</span> | 🌙 <span id="sunset" class="text-white">--</span>
                        </p>
                    </div>
                </div>
                <div class="absolute -left-20 -bottom-20 w-64 h-64 bg-blue-600/10 rounded-full blur-[100px]"></div>
            </div>

            <div class="lg:col-span-4 grid grid-cols-2 gap-4">
                <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center items-center">
                    <span class="text-slate-500 text-[10px] font-black uppercase mb-3 leading-none">Ветер</span>
                    <div class="flex items-center justify-center gap-2 mb-1">
                        <div id="wind-dir" class="text-2xl text-blue-500 transition-transform duration-1000">↑</div>
                        <span id="wind-dir-text" class="text-lg font-black text-white">--</span>
                    </div>
                    <div class="text-xl font-bold"><span id="wind">--</span> <span class="text-xs text-slate-500">м/с</span></div>
                </div>
                <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center">
                    <span class="text-slate-500 text-[10px] font-black uppercase mb-1 leading-none">Давление</span>
                    <div id="pressure" class="text-2xl font-black text-white">--</div>
                    <span class="text-[10px] text-slate-500 mt-1 uppercase">мм рт.ст.</span>
                </div>
                <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center">
                    <span class="text-slate-500 text-[10px] font-black uppercase mb-1">Влажность</span>
                    <div id="humidity" class="text-3xl font-black text-white">--</div>
                    <span class="text-[10px] text-slate-500 mt-1 uppercase">%</span>
                </div>
                <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center">
                    <span class="text-slate-500 text-[10px] font-black uppercase mb-1 leading-none text-slate-500">Ощущается как</span>
                    <div id="feels-like" class="text-3xl font-black text-white mt-1">--°</div>
                </div>
            </div>
        </div>

        <div id="hourly-grid" class="flex gap-4 overflow-x-auto pb-6 mb-8 no-scrollbar scroll-smooth"></div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="glass p-8 rounded-[2.5rem]">
                <h3 class="text-lg font-bold mb-6">📊 Тренд температуры</h3>
                <div class="h-[250px] w-full"><canvas id="tempChart"></canvas></div>
            </div>
            <div id="map" class="h-[350px] lg:h-auto rounded-[2.5rem] border border-white/5 z-0 shadow-2xl"></div>
        </div>
        <div id="forecast-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4 px-2"></div>
    </div>

    <script>
        const API_KEY = "604b73696fe82cfda93d7d8278c9faff"; 
        let map, chart;

        const aqiLevels = {
            1: { text: "Чисто", color: "text-green-400" },
            2: { text: "Норма", color: "text-yellow-400" },
            3: { text: "Средне", color: "text-orange-400" },
            4: { text: "Плохо", color: "text-red-400" },
            5: { text: "Опасно", color: "text-purple-400" }
        };

        const compLabels = { pm2_5: "PM2.5", pm10: "PM10", no2: "NO₂", o3: "O₃", co: "CO", so2: "SO₂", nh3: "NH₃", no: "NO" };
        const formatT = (ts) => new Date(ts * 1000).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
        const toggleAQI = () => document.getElementById('aqi-details').classList.toggle('open');

        async function fetchWeather(query) {
            try {
                let coords;
                if (typeof query === 'string') {
                    const gRes = await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${query}&limit=1&appid=${API_KEY}`);
                    const gData = await gRes.json();
                    if (!gData.length) throw new Error("Город не найден");
                    coords = { lat: gData[0].lat, lon: gData[0].lon };
                } else { coords = query; }

                const wRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${coords.lat}&lon=${coords.lon}&appid=${API_KEY}&units=metric&lang=ru`);
                const wData = await wRes.json();
                if (wData.cod !== "200") throw new Error(wData.message);
                
                let aData = null;
                try {
                    const aRes = await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${coords.lat}&lon=${coords.lon}&appid=${API_KEY}`);
                    aData = await aRes.json();
                } catch(e) { console.warn("AQI Error"); }

                updateUI(wData, aData);
            } catch (e) {
                document.getElementById('city-name').innerText = "Ошибка";
                document.getElementById('current-desc').innerText = e.message;
            }
        }

        function updateUI(data, aqiData) {
            const current = data.list[0];
            const city = data.city;

            document.getElementById('city-name').innerText = city.name;
            document.getElementById('current-temp').innerText = `${Math.round(current.main.temp)}°`;
            document.getElementById('current-desc').innerText = current.weather[0].description;
            document.getElementById('main-icon').src = `https://openweathermap.org/img/wn/${current.weather[0].icon}@4x.png`;
            document.getElementById('feels-like').innerText = `${Math.round(current.main.feels_like)}°`;
            document.getElementById('sunrise').innerText = formatT(city.sunrise);
            document.getElementById('sunset').innerText = formatT(city.sunset);
            document.getElementById('wind').innerText = Math.round(current.wind.speed);
            document.getElementById('humidity').innerText = current.main.humidity;
            document.getElementById('clouds').innerText = current.clouds.all;
            document.getElementById('pressure').innerText = Math.round(current.main.pressure * 0.75006);
            document.getElementById('wind-dir').style.transform = `rotate(${current.wind.deg}deg)`;
            document.getElementById('wind-dir-text').innerText = ['С','СВ','В','ЮВ','Ю','ЮЗ','З','СЗ'][Math.round(current.wind.deg/45)%8];

            if (aqiData) {
                document.getElementById('aqi-card').classList.remove('hidden');
                const aqi = aqiData.list[0].main.aqi;
                document.getElementById('aqi-val').innerText = aqi;
                document.getElementById('aqi-text').innerText = aqiLevels[aqi].text;
                document.getElementById('aqi-text').className = `text-[10px] font-bold px-2 py-0.5 rounded-md bg-slate-800 ${aqiLevels[aqi].color}`;
                document.getElementById('aqi-components-grid').innerHTML = Object.entries(aqiData.list[0].components).map(([k,v]) => `
                    <div class="text-center"><span class="text-[9px] text-slate-500 block uppercase font-bold">${compLabels[k]||k}</span><span class="text-xs font-bold text-white">${Math.round(v)}</span></div>
                `).join('');
            }

            document.getElementById('hourly-grid').innerHTML = data.list.slice(0, 10).map(h => `
                <div class="glass min-w-[110px] p-4 rounded-3xl text-center border-white/5">
                    <div class="text-slate-500 text-[10px] mb-1 font-bold">${h.dt_txt.split(' ')[1].substring(0, 5)}</div>
                    <img src="https://openweathermap.org/img/wn/${h.weather[0].icon}.png" class="mx-auto w-10">
                    <div class="text-lg font-black">${Math.round(h.main.temp)}°</div>
                </div>
            `).join('');

            const daily = data.list.filter((_, i) => i % 8 === 0);
            if (chart) chart.destroy();
            chart = new Chart(document.getElementById('tempChart'), {
                type: 'line',
                data: {
                    labels: daily.map(d => new Date(d.dt * 1000).toLocaleDateString('ru', {weekday: 'short'})),
                    datasets: [{
                        data: daily.map(d => d.main.temp),
                        borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)',
                        pointRadius: 5, pointBackgroundColor: '#3b82f6', borderWidth: 3
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#ffffff' }, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { ticks: { color: '#94a3b8' }, grid: { display: false } } } }
            });

            const coords = [city.coord.lat, city.coord.lon];
            if (map) map.remove();
            map = L.map('map', { zoomControl: false }).setView(coords, 11);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { className: 'map-tiles' }).addTo(map);
            L.circle(coords, { color: '#3b82f6', radius: 2000, fillOpacity: 0.1, weight: 1 }).addTo(map);

            document.getElementById('forecast-grid').innerHTML = daily.map(day => `
                <div class="glass p-5 rounded-3xl text-center">
                    <div class="text-slate-500 text-[10px] font-bold uppercase mb-1">${new Date(day.dt * 1000).toLocaleDateString('ru', {day: 'numeric', month: 'short'})}</div>
                    <img src="https://openweathermap.org/img/wn/${day.weather[0].icon}@2x.png" class="mx-auto w-12">
                    <div class="text-xl font-black">${Math.round(day.main.temp)}°</div>
                </div>
            `).join('');
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    p => fetchWeather({ lat: p.coords.latitude, lon: p.coords.longitude }),
                    () => fetchWeather("Moscow")
                );
            } else { fetchWeather("Moscow"); }
        }

        function searchCity() {
            const v = document.getElementById('city-input').value;
            if (v) fetchWeather(v);
        }

        document.getElementById('city-input').addEventListener('keypress', e => { if (e.key === 'Enter') searchCity(); });
        window.onload = getLocation;
    </script>
</body>
</html>
