<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #e2e8f0; margin: 0; min-height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }

        /* Реальный Skeleton Loader */
        .skeleton { 
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); 
            background-size: 200% 100%; 
            animation: shimmer 2s infinite linear; 
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Анимация точек */
        .dots::after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }

        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        #aqi-details { display: grid; grid-template-rows: 0fr; transition: all 0.5s ease; opacity: 0; }
        #aqi-details.open { grid-template-rows: 1fr; opacity: 1; margin-top: 1rem; }
    </style>
</head>
