<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Radar Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#0f172a] text-white min-h-screen">
    <div class="container mx-auto p-4 max-w-5xl">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-2 bg-gradient-to-br from-blue-600 to-blue-800 p-8 rounded-[2rem] shadow-2xl flex justify-between items-center relative overflow-hidden">
                <div class="relative z-10">
                    <h1 id="city-name" class="text-5xl font-black mb-2">Загрузка...</h1>
                    <p id="current-desc" class="text-blue-100 text-xl capitalize"></p>
                </div>
                <div class="relative z-10 text-right">
                    <div id="current-temp" class="text-7xl font-black">--°</div>
                </div>
                <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
            </div>

            <div class="bg-slate-800/50 p-8 rounded-[2rem] border border-slate-700 flex flex-col justify-center">
                <div class="mb-4">
                    <span class="text-slate-400 block text-sm uppercase font-bold tracking-wider">Влажность</span>
                    <span id="humidity" class="text-3xl font-bold">-- %</span>
                </div>
                <div>
                    <span class="text-slate-400 block text-sm uppercase font-bold tracking-wider">Ветер</span>
                    <span id="wind" class="text-3xl font-bold">-- м/с</span>
                </div>
            </div>
        </div>

        <div id="map" class="h-[400px] rounded-[2rem] mb-8 border border-slate-700 shadow-inner z-0"></div>

        <h2 class="text-2xl font-black mb-6 px-4">Прогноз на 5 дней</h2>
        <div id="forecast-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
    </div>

    <script>
        async function init() {
            try {
                const res = await fetch('data/weather.json');
                const data = await res.json();
                
                // Обновление UI
                document.getElementById('city-name').innerText = data.city;
                document.getElementById('current-temp').innerText = `${Math.round(data.current.main.temp)}°`;
                document.getElementById('current-desc').innerText = data.current.weather[0].description;
                document.getElementById('humidity').innerText = `${data.current.main.humidity} %`;
                document.getElementById('wind').innerText = `${data.current.wind.speed} м/с`;

                const grid = document.getElementById('forecast-grid');
                grid.innerHTML = data.daily.map(day => `
                    <div class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700 text-center hover:bg-slate-800 transition-colors">
                        <div class="text-slate-400 text-xs font-bold mb-2 uppercase">
                            ${new Date(day.dt * 1000).toLocaleDateString('ru', {weekday: 'short', day: 'numeric'})}
                        </div>
                        <img src="https://openweathermap.org/img/wn/${day.weather[0].icon}@2x.png" class="mx-auto w-16 h-16">
                        <div class="text-2xl font-black">${Math.round(day.main.temp)}°</div>
                    </div>
                `).join('');

                // Работа с картой и геолокацией
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        const { latitude, longitude } = pos.coords;
                        const map = L.map('map', { zoomControl: false }).setView([latitude, longitude], 11);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            className: 'map-tiles'
                        }).addTo(map);
                        L.marker([latitude, longitude]).addTo(map).bindPopup('Вы здесь').openPopup();
                    }, () => {
                        // Если доступ запрещен, показываем город из прогноза
                        const map = L.map('map').setView([55.75, 37.61], 10);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    });
                }
            } catch (e) {
                console.error("Данные не загружены");
            }
        }
        init();
    </script>
    <style>
        /* Стилизация карты под темную тему */
        .map-tiles { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
    </style>
</body>
</html>
