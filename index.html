<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #e2e8f0; margin: 0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .animate-weather { animation: float 4s ease-in-out infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        #aqi-details { 
            display: grid; 
            grid-template-rows: 0fr; 
            transition: grid-template-rows 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; 
            opacity: 0; 
        }
        #aqi-details.open { 
            grid-template-rows: 1fr; 
            opacity: 1; 
            margin-top: 1.5rem; 
        }
    </style>
</head>
<body class="pb-12">
    <div class="container mx-auto p-4 max-w-6xl">
        
        <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8 mt-6">
            <h1 class="text-4xl font-black text-white tracking-tighter uppercase italic">
                <span class="text-blue-400">Sky</span>Cast
            </h1>
            <div class="flex flex-col md:flex-row gap-3 w-full md:w-auto">
                <div class="relative flex-grow md:w-64 text-slate-900">
                    <input type="text" id="city-input" placeholder="Поиск города..." class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-3 px-5 focus:outline-none focus:border-blue-500 text-white">
                    <button onclick="searchCity()" class="absolute right-2 top-2 bg-blue-600 p-2 rounded-xl text-white">🔍</button>
                </div>
                <button onclick="getLocation()" class="bg-slate-800 border border-slate-700 px-5 py-3 rounded-2xl text-sm font-bold text-white hover:bg-slate-700 active:scale-95 transition-all">📍 Мое место</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
            <div class="lg:col-span-8 glass p-6 sm:p-8 rounded-[2.5rem] relative overflow-hidden shadow-2xl">
                <div class="flex flex-col md:flex-row justify-between items-center relative z-10 text-white">
                    <div class="text-center md:text-left w-full md:max-w-[65%]">
                        <h2 id="city-name" class="text-4xl sm:text-6xl font-extrabold tracking-tighter mb-2 break-words leading-tight">Загрузка...</h2>
                        <p id="current-desc" class="text-blue-400 text-xl md:text-2xl font-medium capitalize mb-6"></p>
                        
                        <div class="flex flex-col gap-3">
                            <div class="flex flex-wrap gap-3 justify-center md:justify-start">
                                <div onclick="toggleAQI()" id="aqi-card" class="bg-slate-900/50 px-4 py-3 rounded-2xl border border-white/5 cursor-pointer hover:bg-slate-800 transition-all hidden group">
                                    <span class="text-slate-500 text-[10px] block uppercase font-black mb-1 group-hover:text-blue-400 font-bold">Воздух (AQI) ▾</span>
                                    <div class="flex items-center gap-2">
                                        <span id="aqi-val" class="font-bold text-lg text-white">--</span>
                                        <span id="aqi-text" class="text-[10px] font-bold px-2 py-0.5 rounded-md bg-slate-800">--</span>
                                    </div>
                                </div>
                                <div class="bg-slate-900/50 px-4 py-3 rounded-2xl border border-white/5">
                                    <span class="text-slate-500 text-[10px] block uppercase font-black mb-1 font-bold">Облачность</span>
                                    <span id="clouds" class="font-bold text-lg text-white">--</span><span class="text-xs ml-1 font-bold text-slate-400">%</span>
                                </div>
                            </div>
                            <div id="aqi-details">
                                <div class="overflow-hidden">
                                    <div id="aqi-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3 p-5 bg-slate-950/60 rounded-3xl border border-blue-500/10"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="text-center mt-8 md:mt-0">
                        <div id="weather-icon-box" class="animate-weather hidden">
                            <img id="main-icon" src="" class="w-32 h-32 md:w-44 md:h-44 object-contain mx-auto drop-shadow-[0_10px_40px_rgba(59,130,246,0.3)]">
                        </div>
                        <div id="current-temp" class="text-8xl md:text-9xl font-black leading-none tracking-tighter text-white">--°</div>
                        <p class="text-slate-500 mt-4 text-xs font-bold uppercase tracking-widest italic text-center text-slate-400 font-bold">
                            ☀️ <span id="sunrise">--:--</span> | 🌙 <span id="sunset">--:--</span>
                        </p>
                    </div>
                </div>
                <div class="absolute -left-20 -bottom-20 w-64 h-64 bg-blue-600/10 rounded-full blur-[100px]"></div>
            </div>

            <div class="lg:col-span-4 grid grid-cols-2 gap-4 text-white">
                <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center items-center">
                    <span class="text-slate-500 text-[10px] font-black uppercase mb-3 leading-none font-bold">Ветер</span>
                    <div class="flex items-center justify-center gap-2 mb-1">
                        <div id="wind-dir" class="text-2xl text-blue-500 transition-transform duration-1000">↑</div>
                        <span id="wind-dir-text" class="text-lg font-black uppercase">--</span>
                    </div>
                    <div class="text-xl font-bold"><span id="wind">--</span> <span class="text-xs text-slate-500 font-normal">м/с</span></div>
                </div>
                <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center font-bold">
                    <span class="text-slate-500 text-[10px] font-black uppercase mb-1 leading-none text-slate-500">Давление</span>
                    <div id="pressure" class="text-2xl font-black">--</div>
                    <span class="text-[10px] text-slate-400 mt-1 uppercase">мм рт.ст.</span>
                </div>
                <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center font-bold">
                    <span class="text-slate-500 text-[10px] font-black uppercase mb-1 leading-none text-slate-500">Влажность</span>
                    <div id="humidity" class="text-3xl font-black">--</div>
                    <span class="text-[10px] text-slate-500 mt-1 uppercase font-bold text-slate-600">%</span>
                </div>
                <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center font-bold">
                    <span class="text-slate-500 text-[10px] font-black uppercase mb-1 leading-none text-slate-500">Ощущается как</span>
                    <div id="feels-like" class="text-3xl font-black mt-1">--°</div>
                </div>
            </div>
        </div>

        <div id="hourly-grid" class="flex gap-4 overflow-x-auto pb-6 mb-8 no-scrollbar scroll-smooth"></div>

        <div class="glass p-8 rounded-[2.5rem] mb-8 text-white">
            <h3 class="text-lg font-bold mb-6">📊 Тренд температуры</h3>
            <div class="h-[250px] w-full"><canvas id="tempChart"></canvas></div>
        </div>

        <div id="forecast-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4 px-2 text-white font-bold"></div>
    </div>
