<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .map-tiles { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        .animate-weather { animation: float 4s ease-in-out infinite; }
        .wind-arrow { transition: transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Анимация раскрытия панели */
        #aqi-details {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.5s ease-out, opacity 0.3s ease;
            opacity: 0;
        }
        #aqi-details.open {
            grid-template-rows: 1fr;
            opacity: 1;
            margin-top: 1rem;
        }
    </style>
</head>
<body class="pb-12">
    <div class="container mx-auto p-4 max-w-6xl">
        
        <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8 mt-6">
            <h1 class="text-4xl font-black text-white tracking-tighter uppercase italic">
                <span class="text-blue-400">Sky</span>Cast
            </h1>
            <div class="flex flex-col md:flex-row gap-3 w-full md:w-auto">
                <div class="relative flex-grow md:w-64">
                    <input type="text" id="city-input" placeholder="Поиск города..." class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-3 px-5 focus:outline-none focus:border-blue-500 text-white">
                    <button onclick="searchCity()" class="absolute right-2 top-2 bg-blue-600 p-2 rounded-xl text-white">🔍</button>
                </div>
                <button onclick="getLocation()" class="bg-slate-800 border border-slate-700 px-5 py-3 rounded-2xl text-sm font-bold hover:bg-slate-700 transition-all active:scale-95">📍 Мое место</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
            <div class="lg:col-span-8 glass p-8 rounded-[2.5rem] flex flex-col md:flex-row justify-between items-center relative overflow-hidden shadow-2xl">
                <div class="z-10 text-center md:text-left w-full md:max-w-[60%]">
                    <h2 id="city-name" class="text-4xl sm:text-5xl lg:text-6xl font-extrabold tracking-tighter text-white mb-2 break-words leading-tight">Загрузка...</h2>
                    <p id="current-desc" class="text-blue-400 text-xl md:text-2xl font-medium capitalize mb-6"></p>
                    
                    <div class="flex flex-col gap-3">
                        <div class="flex flex-wrap gap-3 justify-center md:justify-start">
                            <div onclick="toggleAQI()" class="bg-slate-900/50 px-4 py-3 rounded-2xl border border-white/5 cursor-pointer hover:bg-slate-800 transition-all group active:scale-95">
                                <span class="text-slate-500 text-[10px] block uppercase font-black mb-1 group-hover:text-blue-400 transition-colors">Воздух (AQI) ▾</span>
                                <div class="flex items-center gap-2">
                                    <span id="aqi-val" class="font-bold text-lg text-white">--</span>
                                    <span id="aqi-text" class="text-[10px] font-bold px-2 py-0.5 rounded-md bg-slate-800">--</span>
                                </div>
                            </div>
                            <div class="bg-slate-900/50 px-4 py-3 rounded-2xl border border-white/5">
                                <span class="text-slate-500 text-[10px] block uppercase font-black mb-1">Облачность</span>
                                <span id="clouds" class="font-bold text-lg text-white">--</span><span class="text-xs ml-1 font-bold text-slate-400">%</span>
                            </div>
                        </div>

                        <div id="aqi-details">
                            <div class="overflow-hidden">
                                <div id="aqi-components-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-2 p-4 bg-slate-900/80 rounded-2xl border border-blue-500/20">
                                    </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="z-10 text-center mt-8 md:mt-0 relative">
                    <div id="weather-icon-box" class="animate-weather hidden">
                        <img id="main-icon" src="" class="w-32 h-32 md:w-44 md:h-44 object-contain mx-auto drop-shadow-[0_10px_40px_rgba(59,130,246,0.3)]">
                    </div>
                    <div id="current-temp" class="text-8xl md:text-9xl font-black text-white leading-none tracking-tighter">--°</div>
                    <p class="text-slate-500 mt-4 text-xs font-bold uppercase tracking
