<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #e2e8f0; margin: 0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .map-tiles { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .animate-weather { animation: float 4s ease-in-out infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #aqi-details { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.5s ease-out, opacity 0.3s ease; opacity: 0; }
        #aqi-details.open { grid-template-rows: 1fr; opacity: 1; margin-top: 1.5rem; }
    </style>
</head>
<body class="pb-12">
    <div class="container mx-auto p-4 max-w-6xl">
        
        <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8 mt-6">
            <h1 class="text-4xl font-black text-white tracking-tighter uppercase italic">
                <span class="text-blue-400">Sky</span>Cast
            </h1>
            <div class="flex flex-col md:flex-row gap-3 w-full md:w-auto">
                <div class="relative flex-grow md:w-64 text-slate-900">
                    <input type="text" id="city-input" placeholder="Город..." class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-3 px-5 focus:outline-none focus:border-blue-500 text-white">
                    <button onclick="searchCity()" class="absolute right-2 top-2 bg-blue-600 p-2 rounded-xl text-white">🔍</button>
                </div>
                <button onclick="getLocation()" class="bg-slate-800 border border-slate-700 px-5 py-3 rounded-2xl text-sm font-bold text-white hover:bg-slate-700 active:scale-95 transition-all">📍 Мое место</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
            <div class="lg:col-span-8 glass p-6 sm:p-8 rounded-[2.5rem] relative overflow-hidden shadow-2xl">
                <div class="flex flex-col md:flex-row justify-between items-center relative z-10 text-white">
                    <div class="text-center md:text-left w-full md:max-w-[65%]">
                        <h2 id="city-name" class="text-4xl sm:text-6xl font-extrabold tracking-tighter mb-2 break-words leading-tight">Поиск...</h2>
                        <p id="current-desc" class="text-blue-400 text-xl md:text-2xl font-medium capitalize mb-6"></p>
                        
                        <div class="flex flex-wrap gap-3 justify-center md:justify-start mb-4">
                            <div onclick="toggleAQI()" id="aqi-card" class="bg-slate-900/50 px-4 py-3 rounded-2xl border border-white/5 cursor-pointer hover:bg-slate-800 hidden group transition-all">
                                <span class="text-slate-500 text-[10px] block uppercase font-black mb-1 group-hover:text-blue-400">Воздух (AQI) ▾</span>
                                <div class="flex items-center gap-2">
                                    <span id="aqi-val" class="font-bold text-lg">--</span>
                                    <span id="aqi-text" class="text-[10px] font-bold px-2 py-0.5 rounded-md bg-slate-800">--</span>
                                </div>
                            </div>
                            <div class="bg-slate-900/50 px-4 py-3 rounded-2xl border border-white/5">
                                <span class="text-slate-500 text-[10px] block uppercase font-black mb-1">Облачность</span>
                                <span id="clouds" class="font-bold text-lg">--</span><span class="text-xs ml-1 font-bold text-slate-400">%</span>
                            </div>
                        </div>
                        <div id="aqi-details"><div class="overflow-hidden"><div id="aqi-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3 p-5 bg-slate-950/60 rounded-3xl border border-blue-500/10"></div></div></div>
                    </div>

                    <div class="text-center mt-8 md:mt-0">
                        <div id="weather-icon-box" class="animate-weather">
                            <img id="main-icon" src="" class="w-32 h-32 md:w-44 md:h-44 object-contain mx-auto drop-shadow-[0_10px_40px_rgba(59,130,246,0.3)]">
                        </div>
                        <div id="current-temp" class="text-8xl md:text-9xl font-black leading-none tracking-tighter">--°</div>
                        <p class="text-slate-500 mt-4 text-xs font-bold uppercase tracking-widest italic">
                            ☀️ <span id="sunrise">--:--</span> | 🌙 <span id="sunset">--:--</span>
                        </p>
                    </div>
                </div>
                <div class="absolute -left-20 -bottom-20 w-64 h-64 bg-blue-600/10 rounded-full blur-[100px]"></div>
            </div>

            <div class="lg:col-span-4 grid grid-cols-2 gap-4 text-white">
                <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center items-center">
                    <span class="text-slate-500 text-[10px] font-black uppercase mb-3 leading-none">Ветер</span>
                    <div class="flex items-center justify-center gap-2 mb-1">
                        <div id="wind-dir" class="text-2xl text-blue-500 transition-transform duration-1000">↑</div>
                        <span id="wind-dir-text" class="text-lg font-black uppercase">--</span>
                    </div>
                    <div class="text-xl font-bold"><span id="wind">--</span> <span class="text-xs text-slate-500">м/с</span></div>
                </div>
                <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center font-bold">
                    <span class="text-slate-500 text-[10px] font-black uppercase mb-1 text-slate-500">Давление</span>
                    <div id="pressure" class="text-2xl font-black">--</div>
                    <span class="text-[10px] text-slate-400 mt-1 uppercase">мм рт.ст.</span>
                </div>
                <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center font-bold">
                    <span class="text-slate-500 text-[10px] font-black uppercase mb-1 text-slate-500">Влажность</span>
                    <div id="humidity" class="text-3xl font-black">--</div>
                    <span class="text-[10px] text-slate-500 mt-1 uppercase font-bold text-slate-600">%</span>
                </div>
                <div class="glass p-6 rounded-3xl text-center flex flex-col justify-center font-bold">
                    <span class="text-slate-500 text-[10px] font-black uppercase mb-1 text-slate-500">Ощущается</span>
                    <div id="feels-like" class="text-3xl font-black mt-1">--°</div>
                </div>
            </div>
        </div>

        <div id="hourly-grid" class="flex gap-4 overflow-x-auto pb-6 mb-8 no-scrollbar scroll-smooth"></div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8 text-white">
            <div class="glass p-8 rounded-[2.5rem] min-h-[300px]">
                <h3 class="text-lg font-bold mb-6">📊 Тренд температуры</h3>
                <div class="h-[200px] w-full"><canvas id="tempChart"></canvas></div>
            </div>
            <div id="map" class="h-[300px] lg:h-auto rounded-[2.5rem] border border-white/5 z-0 shadow-2xl"></div>
        </div>
        <div id="forecast-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4 px-2 text-white"></div>
    </div>

    <script>
        const API_KEY = "604b73696fe82cfda93d7d8278c9faff";
        let map, chart;

        const aqiLevels = { 1: { text: "Чисто", color: "text-green-400" }, 2: { text: "Норма", color: "text-yellow-400" }, 3: { text: "Средне", color: "text-orange-400" }, 4: { text: "Плохо", color: "text-red-400" }, 5: { text: "Опасно", color: "text-purple-400" } };
        const pollutantNames = { co: "CO (Угарный)", no: "NO", no2: "NO₂", o3: "O₃ (Озон)", so2: "SO₂", pm2_5: "PM2.5", pm10: "PM10", nh3: "NH₃" };
        const getCompColor = (k, v) => {
            const lim = { pm2_5: [10, 25, 50, 75], pm10: [20, 50, 100, 200], no2: [40, 70, 150, 200], o3: [60, 100, 140, 180], so2: [20, 80, 250, 350], co: [4400, 9400, 12400, 15400] };
            if (!lim[k]) return 'text-white';
            if (v <= lim[k][0]) return 'text-green-400';
            if (v <= lim[k][1]) return 'text-yellow-400';
            if (v <= lim[k][2]) return 'text-orange-400';
            return 'text-red-400';
        };

        const toggleAQI = () => document.getElementById('aqi-details').classList.toggle('open');

        async function fetchWeather(query) {
            const cityEl = document.getElementById('city-name');
            cityEl.innerText = "Загрузка...";
            
            try {
                let url;
                if (typeof query === 'string') {
                    url = `https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(query)}&appid=${API_KEY}&units=metric&lang=ru`;
                } else {
                    url = `https://api.openweathermap.org/data/2.5/forecast?lat=${query.lat}&lon=${query.lon}&appid=${API_KEY}&units=metric&lang=ru`;
                }

                const res = await fetch(url);
                const data = await res.json();
                if (data.cod !== "200") throw new Error(data.message);

                updateUI(data);
                fetchAQI(data.city.coord.lat, data.city.coord.lon);
            } catch (e) {
                cityEl.innerText = "Ошибка Сети";
                document.getElementById('current-desc').innerText = "Проверьте VPN или ключ";
                console.error(e);
            }
        }

        async function fetchAQI(lat, lon) {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`);
                const data = await res.json();
                if (!data.list) return;
                
                const card = document.getElementById('aqi-card');
                card.classList.remove('hidden');
                const main = data.list[0].main.aqi;
                document.getElementById('aqi-val').innerText = main;
                document.getElementById('aqi-text').innerText = aqiLevels[main].text;
                document.getElementById('aqi-text').className = `text-[10px] font-bold px-2 py-0.5 rounded-md bg-slate-800 ${aqiLevels[main].color}`;
                
                document.getElementById('aqi-grid').innerHTML = Object.entries(data.list[0].components).map(([k, v]) => `
                    <div class="flex justify-between items-center bg-white/5 p-2 px-3 rounded-xl">
                        <span class="text-[10px] font-bold text-slate-400 uppercase">${pollutantNames[k] || k}</span>
                        <span class="text-sm font-black ${getCompColor(k, v)}">${Math.round(v)}</span>
                    </div>
                `).join('');
            } catch(e) { console.warn("AQI Fail"); }
        }

        function updateUI(data) {
            const cur = data.list[0];
            const city = data.city;

            document.getElementById('city-name').innerText = city.name;
            document.getElementById('current-temp').innerText = `${Math.round(cur.main.temp)}°`;
            document.getElementById('current-desc').innerText = cur.weather[0].description;
            document.getElementById('main-icon').src = `https://openweathermap.org/img/wn/${cur.weather[0].icon}@4x.png`;
            document.getElementById('feels-like').innerText = `${Math.round(cur.main.feels_like)}°`;
            document.getElementById('clouds').innerText = cur.clouds.all;
            document.getElementById('humidity').innerText = cur.main.humidity;
            document.getElementById('pressure').innerText = Math.round(cur.main.pressure * 0.75006);
            document.getElementById('wind').innerText = Math.round(cur.wind.speed);
            document.getElementById('wind-dir').style.transform = `rotate(${cur.wind.deg}deg)`;
            document.getElementById('wind-dir-text').innerText = ['С','СВ','В','ЮВ','Ю','ЮЗ','З','СЗ'][Math.round(cur.wind.deg/45)%8];
            
            const formatTime = (ts) => new Date(ts * 1000).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('sunrise').innerText = formatTime(city.sunrise);
            document.getElementById('sunset').innerText = formatTime(city.sunset);

            // Hourly
            document.getElementById('hourly-grid').innerHTML = data.list.slice(0, 10).map(h => `
                <div class="glass min-w-[110px] p-4 rounded-3xl text-center">
                    <div class="text-slate-500 text-[10px] mb-1 font-bold">${h.dt_txt.split(' ')[1].substring(0, 5)}</div>
                    <img src="https://openweathermap.org/img/wn/${h.weather[0].icon}.png" class="mx-auto w-10">
                    <div class="text-lg font-black">${Math.round(h.main.temp)}°</div>
                </div>
            `).join('');

            // Chart
            const daily = data.list.filter((_, i) => i % 8 === 0);
            if (chart) chart.destroy();
            const ctx = document.getElementById('tempChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: daily.map(d => new Date(d.dt * 1000).toLocaleDateString('ru', {weekday: 'short'})),
                    datasets: [{ data: daily.map(d => d.main.temp), borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)', pointRadius: 5, borderWidth: 3 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#ffffff' } }, x: { ticks: { color: '#94a3b8' } } } }
            });

            // Map
            if (map) map.remove();
            map = L.map('map', { zoomControl: false }).setView([city.coord.lat, city.coord.lon], 11);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { className: 'map-tiles' }).addTo(map);
            L.circle([city.coord.lat, city.coord.lon], { color: '#3b82f6', radius: 2000, fillOpacity: 0.1 }).addTo(map);
            map.on('click', (e) => fetchWeather({ lat: e.latlng.lat, lon: e.latlng.lng }));

            // Forecast
            document.getElementById('forecast-grid').innerHTML = daily.map(day => `
                <div class="glass p-5 rounded-3xl text-center">
                    <div class="text-slate-500 text-[10px] font-bold uppercase mb-1">${new Date(day.dt * 1000).toLocaleDateString('ru', {day: 'numeric', month: 'short'})}</div>
                    <img src="https://openweathermap.org/img/wn/${day.weather[0].icon}@2x.png" class="mx-auto w-12">
                    <div class="text-xl font-black">${Math.round(day.main.temp)}°</div>
                </div>
            `).join('');
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    p => fetchWeather({ lat: p.coords.latitude, lon: p.coords.longitude }),
                    () => fetchWeather("Moscow"),
                    { timeout: 5000 }
                );
            } else { fetchWeather("Moscow"); }
        }

        function searchCity() {
            const v = document.getElementById('city-input').value;
            if (v) fetchWeather(v);
        }

        document.getElementById('city-input').addEventListener('keypress', e => { if (e.key === 'Enter') searchCity(); });
        window.onload = getLocation;
    </script>
</body>
</html>
