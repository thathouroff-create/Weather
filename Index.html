<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Radar Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div class="container mx-auto p-4 max-w-4xl">
        <header class="flex justify-between items-center mb-8 bg-slate-900 p-6 rounded-3xl border border-slate-800">
            <div>
                <h1 id="city-name" class="text-4xl font-black text-blue-400">Загрузка...</h1>
                <p id="current-desc" class="text-slate-400 text-lg capitalize"></p>
            </div>
            <div class="text-right">
                <div id="current-temp" class="text-6xl font-black">--°C</div>
            </div>
        </header>

        <div id="map" class="h-64 rounded-3xl mb-8 border border-slate-800 z-0"></div>

        <h2 class="text-xl font-bold mb-4 px-2">Прогноз на неделю</h2>
        <div id="forecast-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4">
            </div>
    </div>

    <script>
        async function init() {
            try {
                // 1. Получаем данные из нашего JSON
                const res = await fetch('data/weather.json');
                const data = await res.json();
                
                // 2. Отрисовка текущей погоды
                document.getElementById('city-name').innerText = data.city;
                document.getElementById('current-temp').innerText = `${Math.round(data.current.main.temp)}°C`;
                document.getElementById('current-desc').innerText = data.current.weather[0].description;

                // 3. Отрисовка прогноза
                const grid = document.getElementById('forecast-grid');
                grid.innerHTML = data.daily.map(day => `
                    <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 text-center">
                        <div class="text-slate-500 text-xs">${new Date(day.dt * 1000).toLocaleDateString('ru', {weekday: 'short'})}</div>
                        <img src="https://openweathermap.org/img/wn/${day.weather[0].icon}@2x.png" class="mx-auto w-12">
                        <div class="text-xl font-bold">${Math.round(day.main.temp)}°C</div>
                    </div>
                `).join('');

                // 4. Геолокация и карта
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        const { latitude, longitude } = pos.coords;
                        const map = L.map('map').setView([latitude, longitude], 10);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                        L.marker([latitude, longitude]).addTo(map).bindPopup('Вы здесь').openPopup();
                    });
                }
            } catch (e) {
                console.error("Данные еще не готовы");
            }
        }
        init();
    </script>
</body>
</html>
